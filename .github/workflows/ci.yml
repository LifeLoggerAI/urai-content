name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run validate:content
      - run: npm run validate:sprites
      - run: npm run content:index
      - run: git diff --exit-code
      - run: npm run smoke
      - run: npm test
      - run: npm run build
      - run: npm run seed:check
      - run: npm run seed:system:check
      - run: npm run verify
      - run: npm run done

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run web:install
      - run: npm run web:check
