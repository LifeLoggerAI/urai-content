name: Governance validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - README.md
      - URAI_FINAL_COMPLETION_AUDIT.md
      - DEPLOYMENT_BLOCKERS.md
      - docs/**
      - .github/**
      - scripts/checkGovernanceDocs.ts
      - scripts/checkNoSecrets.ts
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    name: Governance and security validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run governance validation
        run: npm run check:governance

      - name: Run secret leakage validation
        run: npm run check:secrets
