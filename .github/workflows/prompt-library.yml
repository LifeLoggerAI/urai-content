name: Prompt library validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'prompts/**'
      - 'scripts/checkPromptLibrary.ts'
      - 'scripts/runPromptEvals.ts'
      - 'scripts/runPromptReleaseCandidate.ts'
      - 'scripts/checkGovernanceDocs.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/CODEOWNERS'
      - '.github/pull_request_template.md'
      - '.github/workflows/governance.yml'
      - '.github/workflows/prompt-library.yml'
      - '.github/workflows/prompt-review-gate.yml'
  push:
    branches: [main]
    paths:
      - 'prompts/**'
      - 'scripts/checkPromptLibrary.ts'
      - 'scripts/runPromptEvals.ts'
      - 'scripts/runPromptReleaseCandidate.ts'
      - 'scripts/checkGovernanceDocs.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/CODEOWNERS'
      - '.github/pull_request_template.md'
      - '.github/workflows/governance.yml'
      - '.github/workflows/prompt-library.yml'
      - '.github/workflows/prompt-review-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prompt-library-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  prompt-library:
    name: Source parity, version, links, and fixture regressions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate prompt library and immutable source parity
        run: npm run check:prompts
      - name: Run evaluator fixture regressions (not live release evidence)
        run: npm run test:prompt-evals
      - name: Verify live reports remain candidate-only
        run: npm run test:prompt-release-authority
      - name: Upload exact-head parity and fixture-regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-library-fixture-regression-${{ github.event.pull_request.head.sha || github.sha }}
          retention-days: 90
          if-no-files-found: error
          path: |
            prompt-parity-report.json
            prompt-eval-fixture-report.json
            prompts/parity-manifest.json
            prompts/PARITY.md
            prompts/sources/autonomous-research-agent-google-doc-v1.0.0/**
