name: Prompt independent review gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  prompt-review:
    name: Independent prompt approval
    runs