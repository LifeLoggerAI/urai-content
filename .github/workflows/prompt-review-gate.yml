name: Prompt independent review gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  prompt-review:
    name: Independent prompt approval
    runs-on: ubuntu-latest
    steps:
      - name: Require a current-head human approval for prompt-sensitive changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.notice('No pull request payload; manual dispatch is informational only.');
              return;