name: Prompt independent review gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  prompt-review:
    name: Independent prompt approval
    runs-on: ubuntu-latest
    steps:
      - name: Require a non-author approval for prompt-sensitive changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.notice('No pull request payload; manual dispatch is informational only.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const sensitive = files.some(({ filename }) =>
              filename.startsWith('prompts/') ||
              filename === 'scripts/checkPromptLibrary.ts' ||
              filename === 'scripts/runPromptEvals.ts' ||
              filename === '.github/workflows/prompt-library.yml' ||
              filename === '.github/workflows/prompt-review-gate.yml' ||
              filename === '.github/CODEOWNERS'
            );

            if (!sensitive) {
              core.notice('No prompt-sensitive files changed.');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestByReviewer = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!login || login === pr.user.login) continue;
              const previous = latestByReviewer.get(login);
              const currentTime = new Date(review.submitted_at ?? 0).getTime();
              const previousTime = previous ? new Date(previous.submitted_at ?? 0).getTime() : -1;
              if (!previous || currentTime >= previousTime) latestByReviewer.set(login, review);
            }

            const approvals = [...latestByReviewer.values()].filter((review) => review.state === 'APPROVED');
            if (approvals.length < 1) {
              core.setFailed('Prompt-sensitive changes require at least one approving review from someone other than the author.');
              return;
            }

            core.notice(`Independent approval present from: ${approvals.map((review) => review.user.login).join(', ')}`);
