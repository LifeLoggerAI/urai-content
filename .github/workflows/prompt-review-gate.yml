name: Prompt independent review gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  prompt-review:
    name: Independent prompt approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return core.setFailed('Pull request context required.');
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: pr.number, per_page: 100
            });
            const sensitive = files.some(f =>
              f.filename.startsWith('prompts/') ||
              f.filename === 'scripts/checkPromptLibrary.ts' ||
              f.filename === 'scripts/runPromptEvals.ts' ||
              f.filename === '.github/workflows/prompt-library.yml' ||
              f.filename === '.github/workflows/prompt-review-gate.yml' ||
              f.filename === '.github/CODEOWNERS'
            );
            if (!sensitive) return core.notice('No prompt-sensitive files changed.');
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: pr.number, per_page: 100
            });
            const approved = [];
            for (const r of reviews) {
              const u = r.user;
              if (!u || r.state !== 'APPROVED' || u.login === pr.user.login) continue;
              if (r.commit_id !== pr.head.sha || u.type === 'Bot') continue;
              const p = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner, repo: context.repo.repo, username: u.login
              });
              if (['admin','maintain','write','triage'].includes(p.data.permission)) approved.push(u.login);
            }
            if (!approved.length) core.setFailed('Current-head approval from a human repository collaborator is required.');
            else core.notice(`Independent approval present from: ${[...new Set(approved)].join(', ')}`);
