name: Content rules emulator verification

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: urai-content-rules-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  TARGET_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  rules-emulator:
    name: Firestore and Storage behavioral authorization matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact reviewed head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Prove exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.23.1'

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.1
        with:
          distribution: temurin
          java-version: '21'

      - name: Install isolated rules test harness
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix tests/rules-emulator --ignore-scripts --no-audit --no-fund

      - name: Capture exact rules and dependency identity
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir="$RUNNER_TEMP/content-rules-evidence"
          rm -rf -- "$evidence_dir"
          mkdir -p -- "$evidence_dir"
          sha256sum firestore.rules storage.rules > "$evidence_dir/rules-sha256.txt"
          npm ls --prefix tests/rules-emulator --all --json > "$evidence_dir/dependency-tree.json"
          cp tests/rules-emulator/package-lock.json "$evidence_dir/rules-test-package-lock.json"
          {
            echo "repository=$GITHUB_REPOSITORY"
            echo "exact_head=$TARGET_SHA"
            echo "checked_out=$(git rev-parse HEAD)"
            echo "run_id=$GITHUB_RUN_ID"
            echo "project=urai-content-rules-test"
            echo "credentialed=false"
            echo "deployment=false"
            echo "production_data_mutation=false"
          } > "$evidence_dir/authority.env"

      - name: Execute Firestore and Storage emulator matrix
        id: emulator
        shell: bash
        run: |
          set +e
          set -o pipefail
          evidence_dir="$RUNNER_TEMP/content-rules-evidence"
          npx --yes firebase-tools@15.23.0 emulators:exec \
            --config firebase.json \
            --project urai-content-rules-test \
            --only firestore,storage \
            "node --test --test-concurrency=1 tests/rules-emulator/content-rules.test.mjs" \
            2>&1 | tee "$evidence_dir/emulator.log"
          status=${PIPESTATUS[0]}
          printf '%s\n' "$status" > "$evidence_dir/exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Reject optional-claim evaluation diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/content-rules-evidence/emulator.log"
          if grep -E "Property (role|roles) is undefined|EvaluationException.*(role|roles)" "$log"; then
            echo '::error::Rules emitted an undefined optional-claim diagnostic.'
            exit 1
          fi

      - name: Write verification receipt
        if: always()
        env:
          EMULATOR_STATUS: ${{ steps.emulator.outputs.status }}
        shell: bash
        run: |
          evidence_dir="$RUNNER_TEMP/content-rules-evidence"
          node - <<'NODE'
          const fs = require('node:fs');
          const receipt = {
            schemaVersion: 'urai-content-rules-emulator-receipt-1',
            repository: process.env.GITHUB_REPOSITORY,
            exactHeadSha: process.env.TARGET_SHA,
            workflowRunId: process.env.GITHUB_RUN_ID,
            emulatorStatus: Number(process.env.EMULATOR_STATUS ?? -1),
            projectId: 'urai-content-rules-test',
            credentialed: false,
            deployment: false,
            productionDataMutation: false,
            certification: false,
            boundary: 'Firestore and Storage emulator authorization behavior only; protected cloud deployment, live identities, monitoring and rollback remain separate gates.',
          };
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/content-rules-evidence/receipt.json`, `${JSON.stringify(receipt, null, 2)}\n`);
          NODE

      - name: Upload exact-head rules evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: urai-content-rules-emulator-${{ env.TARGET_SHA }}-${{ github.run_id }}
          path: ${{ runner.temp }}/content-rules-evidence
          if-no-files-found: error
          retention-days: 365

      - name: Remove generated test dependencies
        if: always()
        shell: bash
        run: |
          rm -rf -- tests/rules-emulator/node_modules tests/rules-emulator/package-lock.json

      - name: Prove final clean source
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Enforce emulator result
        shell: bash
        run: test "${{ steps.emulator.outputs.status }}" = '0'
