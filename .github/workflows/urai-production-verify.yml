name: URAI Production Verify

on:
  workflow_dispatch:
  pull_request:

jobs:
  verify:
    name: Build, test, and QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping install."
          fi

      - name: Run typecheck
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm run typecheck --if-present; elif [ -f package.json ]; then npm run typecheck --if-present; fi

      - name: Run tests
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm test --if-present; elif [ -f package.json ]; then npm test --if-present; fi

      - name: Build
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm run build --if-present; elif [ -f package.json ]; then npm run build --if-present; fi

      - name: Run URAI QA
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm run urai:qa --if-present; elif [ -f package.json ]; then npm run urai:qa --if-present; fi
