name: Web E2E

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/web/**
      - .github/workflows/web-e2e.yml
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - .github/workflows/web-e2e.yml
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional deployed base URL. Leave empty to run against local Next dev server.
        required: false
        type: string

permissions:
  contents: read

jobs:
  web-e2e:
    name: Playwright browser E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Typecheck, lint, unit, build
        run: npm run check

      - name: Run browser E2E locally
        if: ${{ github.event.inputs.base_url == '' || github.event.inputs.base_url == null }}
        run: npm run e2e

      - name: Run browser E2E against deployed URL
        if: ${{ github.event.inputs.base_url != '' && github.event.inputs.base_url != null }}
        env:
          URAI_CONTENT_BASE_URL: ${{ github.event.inputs.base_url }}
          PLAYWRIGHT_SKIP_WEB_SERVER: '1'
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
